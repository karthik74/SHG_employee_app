name: employee_app
description: NavaJyothi Employee App for microfinance field officers.
publish_to: 'none'
version: 1.0.4+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Google Maps (uncomment when API key is ready)
  # google_maps_flutter: ^2.5.0

  # HTTP for API calls
  http: ^1.6.0

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Local storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # State management (optional - start with setState)
  # provider: ^6.1.1

  # Image picker (for profile photo)
  image_picker: ^1.0.4

  # PDF for reports
  pdf: ^3.10.7
  printing: ^5.11.1

  # Connectivity check
  connectivity_plus: ^5.0.2

  cupertino_icons: ^1.0.6
  http_parser: ^4.1.2
  url_launcher: ^6.2.5

  # App version info (for version-control check on startup)
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  
  # Add Google Fonts or custom fonts here
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Inter-ExtraBold.ttf
  #         weight: 800

  assets:
    # `.env` is bundled so flutter_dotenv can load it in debug/profile builds.
    # main.dart only calls dotenv.load() when !kReleaseMode, so values never
    # enter memory in release. For release builds, configure via
    # --dart-define=API_BASE_URL=... --dart-define=TENANT_ID=... and ensure
    # the local .env at build time does NOT contain production secrets — the
    # file itself ships inside the APK regardless of when it is read.
    - .env
    - assets/logo.png
    - assets/logo.webp
